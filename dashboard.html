<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마드모아젤 NPS 대시보드</title>
<style>
  :root {
    --burgundy: #8B1A4A; --rosegold: #C9956C; --ivory: #F5F5DC;
    --bg: #FAF7F2; --card: #fff; --text: #2C2C2C; --sub: #6B6B6B;
    --border: #E8D5D0; --good: #1E8449; --bad: #C0392B;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Malgun Gothic','Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); padding:24px; }
  .wrap { max-width:1100px; margin:0 auto; }
  h1 { font-size:22px; color:var(--burgundy); margin-bottom:4px; }
  .sub { color:var(--sub); font-size:13px; margin-bottom:16px; }
  .banner { border-radius:12px; padding:14px 18px; margin-bottom:18px; font-size:14px; line-height:1.7; }
  .banner.sample { background:#FFF6DE; border:1px solid #EFD48A; }
  .banner.live { background:#E8F6EC; border:1px solid #A8D8B4; }
  .banner b { color:var(--burgundy); }
  .banner code { background:rgba(0,0,0,.06); padding:1px 6px; border-radius:6px; font-size:12px; }
  details.setup { margin-top:8px; }
  details.setup summary { cursor:pointer; font-weight:bold; font-size:13px; }
  details.setup ol { margin:8px 0 0 20px; font-size:13px; }
  .toolbar { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:18px; }
  .toolbar .chip { padding:8px 14px; border-radius:20px; border:1px solid var(--border); background:#fff; cursor:pointer; font-size:13px; }
  .toolbar .chip.on { background:var(--burgundy); color:#fff; border-color:var(--burgundy); }
  .toolbar input[type=date] { padding:7px 10px; border:1px solid var(--border); border-radius:10px; font-size:13px; background:#fff; }
  .btn { padding:9px 16px; border:none; border-radius:10px; cursor:pointer; font-size:13px; font-weight:bold; }
  .btn.primary { background:var(--burgundy); color:#fff; }
  .btn.gold { background:#F4E4C1; color:var(--text); }
  .btn.ghost { background:#fff; border:1px solid var(--border); }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:22px; }
  .card { background:var(--card); border-radius:14px; padding:16px 18px; box-shadow:0 4px 16px rgba(139,26,74,.06); }
  .card .k { font-size:12px; color:var(--sub); margin-bottom:6px; }
  .card .v { font-size:26px; font-weight:bold; }
  .card .v small { font-size:13px; font-weight:normal; color:var(--sub); }
  .card .d { font-size:12px; margin-top:4px; color:var(--sub); }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:22px; }
  @media (max-width:860px){ .grid2 { grid-template-columns:1fr; } body { padding:12px; } }
  .panel { background:var(--card); border-radius:14px; padding:18px; box-shadow:0 4px 16px rgba(139,26,74,.06); }
  .panel h2 { font-size:15px; color:var(--burgundy); margin-bottom:12px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { background:var(--ivory); text-align:left; padding:8px 10px; font-size:12px; }
  td { padding:8px 10px; border-bottom:1px solid #F0E6E0; }
  tr:last-child td { border-bottom:none; }
  .nps-pos { color:var(--good); font-weight:bold; }
  .nps-neg { color:var(--bad); font-weight:bold; }
  .nps-mid { font-weight:bold; }
  .chart { width:100%; overflow-x:auto; }
  .kakao { display:grid; grid-template-columns:1fr 300px; gap:18px; }
  @media (max-width:860px){ .kakao { grid-template-columns:1fr; } }
  textarea#draft { width:100%; min-height:340px; padding:14px; border:1px solid var(--border); border-radius:12px; font-family:inherit; font-size:14px; line-height:1.7; resize:vertical; background:#FFFDF8; }
  .opts label { display:flex; align-items:center; gap:8px; font-size:13px; margin-bottom:10px; cursor:pointer; }
  .opts select { padding:6px 10px; border:1px solid var(--border); border-radius:8px; font-size:13px; }
  #copyBtn { width:100%; padding:14px; font-size:15px; margin-top:8px; }
  #copyBtn.done { background:var(--good); color:#fff; }
  .muted { color:var(--sub); font-size:12px; }
  .empty { text-align:center; color:var(--sub); padding:30px 0; font-size:14px; }
  /* 로그인 */
  #loginOverlay { position:fixed; inset:0; background:var(--bg); z-index:1000; display:flex; align-items:center; justify-content:center; }
  .login-box { background:var(--card); border-radius:20px; padding:44px 36px; width:100%; max-width:380px; box-shadow:0 12px 48px rgba(139,26,74,.12); }
  .login-box h2 { color:var(--burgundy); font-size:20px; text-align:center; margin-bottom:6px; }
  .login-box .lsub { text-align:center; color:var(--sub); font-size:13px; margin-bottom:24px; }
  .login-box input { width:100%; padding:14px 16px; border:2px solid var(--border); border-radius:12px; font-size:15px; margin-bottom:12px; font-family:inherit; }
  .login-box input:focus { outline:none; border-color:var(--burgundy); }
  .login-box button { width:100%; padding:14px; border:none; border-radius:12px; background:var(--burgundy); color:#fff; font-size:16px; font-weight:bold; cursor:pointer; font-family:inherit; }
  .login-err { color:var(--bad); font-size:13px; text-align:center; margin-top:12px; min-height:18px; }
  #logoutBtn { margin-left:6px; }
</style>

<body>

<div class="wrap">

    <button class="btn gold" id="excelBtn">📥 엑셀 리포트 다운로드</button>
    <button class="btn ghost" id="logoutBtn">로그아웃</button>
  </div>

  <div class="cards" id="cards"></div>

  <div class="grid2">
    <div class="panel"><h2>🏬 지점별</h2><div id="storeTable"></div></div>
    <div class="panel"><h2>💇 디자이너별</h2><div id="designerTable"></div></div>
  </div>

  <div class="panel" style="margin-bottom:22px;">
    <h2>📈 추이 <select id="trendUnit" style="margin-left:8px;padding:4px 8px;border:1px solid var(--border);border-radius:8px;font-size:12px;"><option value="week">주간</option><option value="month">월간</option></select></h2>

  <div class="panel" id="kakaoPanel">

      <div><textarea id="draft" spellcheck="false"></textarea></div>
      <div class="opts">
        <label><input type="checkbox" id="optStores" checked> 지점별 결과 포함</label>
        <label>디자이너 TOP
          <select id="optTop"><option value="0">미포함</option><option value="3" selected>3명</option><option value="5">5명</option></select>
        </label>
        <label><input type="checkbox" id="optCaution" checked> 응대 지적 경고 포함</label>

        <div class="muted" style="margin-top:10px;">복사 후 카카오톡 채팅방에 붙여넣기(Ctrl+V) 하세요.</div>
      </div>
    </div>

</div>

<script>
'use strict';
/* ═══════════════ 로그인 설정 ═══════════════
 * 데이터 주소는 아이디+비밀번호로 AES-GCM 암호화되어 있습니다.
 * 페이지 소스를 열어봐도 시트 주소가 노출되지 않으며,
 * 올바른 아이디/비밀번호 없이는 데이터를 읽을 수 없습니다.
 * 계정 추가/비밀번호 변경은 Claude에게 요청하세요.
 */
const AUTH_USERS = [
  { id: 'inop01', salt: 'zMbo1hKkZtEZigTBWzrGUg==', iv: 'QVau5RsppbswmLOx', wrapped: 'ahgtuwvI6wEB9adthMewORN3fOQEiVv+hPsa/R9vLmXpRhnqg8PJGGOpDdKjFmP/ZLi/iqgwC9Wbb74FoICaV6luPrTBNqGozwWb/zRA1RIh+CWEir6ebUEsLyf5a8n/BvPHzI01+FUEG8NGNv5kuETPp8VYry2isVPSuUh+87g5zaFDfwZ3/Bvkassz+Yptomt+YRfvCrFNbf6QQJVU1lEKUd5YT9Pnd+T2E9tkRBwm3Zf0MzvnKuCqeUcWOwbdFc1hR0Y=' },
];
let DATA_URL = null; // 로그인 성공 시 복호화되어 채워짐

/* ═══════════════ NPS 계산 코어 (nps-core.js 동일 로직) ═══════════════ */
const NPSCore = (() => {
  function detectScale(records, override) {
    if (override === 5 || override === 10) return override;
    const max = records.reduce((m, r) => Math.max(m, r.score), 0);
    return max > 5 ? 10 : 5;
  }
  function classify(score, scale) {
    if (scale === 10) return score >= 9 ? 'promoter' : score >= 7 ? 'passive' : 'detractor';
    return score >= 5 ? 'promoter' : score >= 4 ? 'passive' : 'detractor';
  }
  function classifyLabel(score, scale) {
    return { promoter: '추천', passive: '중립', detractor: '비추천' }[classify(score, scale)];
  }
  function aggregate(records, scale) {
    const n = records.length;
    if (!n) return { count: 0, nps: null, avg: null, cleanAvg: null, promoters: 0, passives: 0, detractors: 0, revisitYes: 0, revisitRate: null, unkind: 0 };
    let p = 0, ps = 0, d = 0, sum = 0, revisitYes = 0, revisitAnswered = 0, unkind = 0, cleanSum = 0, cleanN = 0;
    for (const r of records) {
      const c = classify(r.score, scale);
      if (c === 'promoter') p++; else if (c === 'passive') ps++; else d++;
      sum += r.score;
      if (typeof r.clean === 'number' && r.clean > 0) { cleanSum += r.clean; cleanN++; }
      if (r.revisit === true) { revisitYes++; revisitAnswered++; }
      else if (r.revisit === false) revisitAnswered++;
      if (r.unkind) unkind++;
    }
    return {
      count: n, nps: Math.round(((p - d) / n) * 100), avg: Math.round((sum / n) * 10) / 10,
      cleanAvg: cleanN ? Math.round((cleanSum / cleanN) * 10) / 10 : null,
      promoters: p, passives: ps, detractors: d, revisitYes,
      revisitRate: revisitAnswered ? Math.round((revisitYes / revisitAnswered) * 100) : null, unkind
    };
  }
  function groupAggregate(records, keyFn, scale) {
    const map = new Map();
    for (const r of records) {
      const k = keyFn(r) || '(미입력)';
      if (!map.has(k)) map.set(k, []);
      map.get(k).push(r);
    }
    const out = [];
    for (const [key, rs] of map) out.push({ key, ...aggregate(rs, scale), _records: rs });
    out.sort((a, b) => (b.nps ?? -101) - (a.nps ?? -101) || b.count - a.count);
    return out;
  }
  function pad(n) { return String(n).padStart(2, '0'); }
  function ymd(d) { return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()); }
  function parseDate(s) { const d = new Date(s); return isNaN(d) ? null : d; }
  function weekStart(d) {
    const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    x.setDate(x.getDate() - (x.getDay() + 6) % 7);
    return x;
  }
  function weekLabel(d) {
    const s = weekStart(d);
    const e = new Date(s); e.setDate(s.getDate() + 6);
    return pad(s.getMonth() + 1) + '/' + pad(s.getDate()) + '~' + pad(e.getMonth() + 1) + '/' + pad(e.getDate());
  }
  function weekKey(d) { return ymd(weekStart(d)); }
  function monthKey(d) { return d.getFullYear() + '-' + pad(d.getMonth() + 1); }
  function trend(records, unit, scale) {
    const map = new Map();
    for (const r of records) {
      const d = parseDate(r.date);
      if (!d) continue;
      const key = unit === 'month' ? monthKey(d) : weekKey(d);
      const label = unit === 'month' ? monthKey(d).replace('-', '.') : weekLabel(d);
      if (!map.has(key)) map.set(key, { key, label, records: [] });
      map.get(key).records.push(r);
    }
    return [...map.values()].sort((a, b) => a.key.localeCompare(b.key))
      .map(g => ({ key: g.key, label: g.label, ...aggregate(g.records, scale) }));
  }
  function filterByRange(records, from, to) {
    return records.filter(r => {
      const d = r.date ? r.date.slice(0, 10) : '';
      if (from && d < from) return false;
      if (to && d > to) return false;
      return true;
    });
  }
  function fmtNps(nps) { return nps == null ? '-' : (nps > 0 ? '+' : '') + nps; }
  function fmtDelta(cur, prev) {
    if (prev == null || cur == null) return '';
    const diff = cur - prev;
    return diff > 0 ? ' (▲' + diff + ')' : diff < 0 ? ' (▼' + Math.abs(diff) + ')' : ' (—)';
  }
  function buildKakaoDraft(records, opts) {
    const o = Object.assign({ periodLabel: '', prevRecords: null, includeStores: true, topDesigners: 3, includeCaution: true, scale: 5 }, opts || {});
    const total = aggregate(records, o.scale);
    const prev = o.prevRecords && o.prevRecords.length ? aggregate(o.prevRecords, o.scale) : null;
    const L = ['📢 마드모아젤 NPS 리포트'];
    if (o.periodLabel) L.push('📅 ' + o.periodLabel);
    L.push('━━━━━━━━━━━━━━');
    if (!total.count) { L.push('해당 기간 응답이 없습니다.'); return L.join('\n'); }
    L.push('⭐ 전체 NPS: ' + fmtNps(total.nps) + fmtDelta(total.nps, prev && prev.nps) + '  (응답 ' + total.count + '건)');
    L.push('😍 추천 ' + total.promoters + ' · 😐 중립 ' + total.passives + ' · 😟 비추천 ' + total.detractors);
    L.push('📈 평균 만족도: ' + total.avg + '점' + (total.cleanAvg != null ? ' · 🧹 청결 ' + total.cleanAvg + '점' : '') + (total.revisitRate != null ? ' · 🔁 재방문 의향 ' + total.revisitRate + '%' : ''));
    if (o.includeStores) {
      const byStore = groupAggregate(records, r => r.store, o.scale);
      if (byStore.length > 1 || (byStore.length === 1 && byStore[0].key !== '(미입력)')) {
        L.push('', '🏬 지점별');
        for (const s of byStore) L.push('· ' + s.key + ': NPS ' + fmtNps(s.nps) + ' (' + s.count + '건)');
      }
    }
    if (o.topDesigners > 0) {
      const byDsn = groupAggregate(records, r => r.designer, o.scale).filter(d => d.key !== '(미입력)' && d.count >= 2);
      if (byDsn.length) {
        L.push('', '🏆 디자이너 TOP' + Math.min(o.topDesigners, byDsn.length));
        byDsn.slice(0, o.topDesigners).forEach((d, i) => L.push((i + 1) + '위 ' + d.key + ' — NPS ' + fmtNps(d.nps) + ' (' + d.count + '건)'));
      }
    }
    if (o.includeCaution && total.unkind > 0) L.push('', '⚠️ 응대 관련 지적 ' + total.unkind + '건 — 함께 신경 써주세요!');
    L.push('', '모두 수고 많으셨습니다 🙏');
    return L.join('\n');
  }
  return { detectScale, classify, classifyLabel, aggregate, groupAggregate, trend, filterByRange, buildKakaoDraft, fmtNps, ymd, weekLabel, weekStart, monthKey };
})();

/* ═══════════════ CSV 파싱 + 레코드 변환 (server.js 동일 로직) ═══════════════ */
function parseCSV(text) {
  const rows = [];
  let row = [], cell = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQ) {
      if (ch === '"') { if (text[i + 1] === '"') { cell += '"'; i++; } else inQ = false; }
      else cell += ch;
    } else if (ch === '"') inQ = true;
    else if (ch === ',') { row.push(cell); cell = ''; }
    else if (ch === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; }
    else if (ch !== '\r') cell += ch;
  }
  if (cell !== '' || row.length) { row.push(cell); rows.push(row); }
  return rows.filter(r => r.some(c => c !== ''));
}
function findHeader(headers, patterns) {
  return headers.findIndex(h => patterns.some(p => (h || '').toLowerCase().includes(p.toLowerCase())));
}
function parseScoreCell(v) {
  if (v == null) return NaN;
  const m = String(v).match(/(\d+(?:\.\d+)?)/);
  return m ? parseFloat(m[1]) : NaN;
}
function parseKoreanTimestamp(s) {
  if (!s) return null;
  s = String(s).trim();
  let m = s.match(/(\d{4})\.\s*(\d{1,2})\.\s*(\d{1,2})\.?(?:\s*(오전|오후)?\s*(\d{1,2}):(\d{2})(?::(\d{2}))?)?/);
  if (m) {
    let h = parseInt(m[5] || '0', 10);
    if (m[4] === '오후' && h < 12) h += 12;
    if (m[4] === '오전' && h === 12) h = 0;
    const d = new Date(+m[1], +m[2] - 1, +m[3], h, +(m[6] || 0), +(m[7] || 0));
    return isNaN(d) ? null : d;
  }
  const d = new Date(s);
  return isNaN(d) ? null : d;
}
function rowsToRecords(rows) {
  if (!rows || rows.length < 2) return [];
  const headers = rows[0].map(h => String(h || '').trim());
  const col = {
    date: findHeader(headers, ['타임스탬프', 'timestamp', '날짜', '제출']),
    store: findHeader(headers, ['지점', 'branch', '방문 지점', '방문지점']),
    designer: findHeader(headers, ['디자이너', 'designer', '담당']),
    gender: findHeader(headers, ['성별', 'gender']),
    age: findHeader(headers, ['나이', 'age', '연령']),
    score: findHeader(headers, ['시술', 'servicesatisfaction', '서비스 만족', '만족도']),
    clean: findHeader(headers, ['청결', 'cleansatisfaction']),
    kindness: findHeader(headers, ['친절', 'kindness', '응대']),
    unkindComment: findHeader(headers, ['불친절', 'unkindcomment']),
    revisit: findHeader(headers, ['재방문', 'revisit']),
    comment: findHeader(headers, ['개선', '의견', 'generalcomment', '자유', '기타']),
    visitorName: findHeader(headers, ['성함', 'visitorname', '이름']),
    visitorPhone: findHeader(headers, ['연락처', 'visitorphone', '전화']),
  };
  const get = (r, i) => (i >= 0 && r[i] != null) ? String(r[i]).trim() : '';
  const records = [];
  for (const r of rows.slice(1)) {
    const score = parseScoreCell(get(r, col.score));
    if (isNaN(score)) continue;
    const d = parseKoreanTimestamp(get(r, col.date));
    const revisitRaw = get(r, col.revisit);
    const kindness = get(r, col.kindness);
    records.push({
      date: d ? NPSCore.ymd(d) : '',
      store: get(r, col.store) || '(미입력)',
      designer: get(r, col.designer) || '(미입력)',
      gender: get(r, col.gender), age: get(r, col.age),
      score, clean: parseScoreCell(get(r, col.clean)) || null,
      kindness, unkind: /불친절/.test(kindness),
      unkindComment: get(r, col.unkindComment),
      revisit: /있/.test(revisitRaw) ? true : (/없/.test(revisitRaw) ? false : null),
      comment: get(r, col.comment),
      visitorName: get(r, col.visitorName), visitorPhone: get(r, col.visitorPhone),
    });
  }
  return records;
}

/* ═══════════════ 샘플 데이터 ═══════════════ */
function sampleRecords() {
  let seed = 20260703;
  const rnd = () => { seed = (seed * 1103515245 + 12345) % 2147483648; return seed / 2147483648; };
  const pick = a => a[Math.floor(rnd() * a.length)];
  const stores = { '나성 1호점': ['김서연', '박지현', '이수민'], '나성 2호점': ['최은지', '정하늘'], '반곡점': ['한소라', '오유진', '강민서'], '마크원 에비뉴점': ['윤채영', '임가은'] };
  const goodC = ['시술이 꼼꼼해서 좋았어요', '디자이너님이 친절하게 설명해주셨어요', '결과물이 마음에 들어요!', '분위기가 좋아요', ''];
  const badC = ['대기 시간이 길었어요', '주차가 불편했어요', '가격 안내가 부족했어요', ''];
  const records = [];
  const today = new Date();
  for (let day = 70; day >= 0; day--) {
    const d = new Date(today); d.setDate(today.getDate() - day);
    const n = Math.floor(rnd() * 4);
    for (let i = 0; i < n; i++) {
      const store = pick(Object.keys(stores));
      const r = rnd();
      const score = r < 0.55 ? 5 : r < 0.8 ? 4 : r < 0.92 ? 3 : (rnd() < 0.5 ? 2 : 1);
      const kindness = score >= 4 ? pick(['매우 친절', '친절']) : score === 3 ? pick(['친절', '보통']) : pick(['보통', '불친절', '매우 불친절']);
      records.push({
        date: NPSCore.ymd(d), store, designer: pick(stores[store]),
        gender: pick(['여자', '여자', '여자', '남자']), age: pick(['20대', '30대', '30대', '40대', '50대 이상', '10대']),
        score, clean: Math.max(1, Math.min(5, score + (rnd() < 0.3 ? -1 : 0) + (rnd() < 0.2 ? 1 : 0))),
        kindness, unkind: /불친절/.test(kindness),
        unkindComment: /불친절/.test(kindness) ? pick(badC) : '',
        revisit: score >= 4 ? (rnd() < 0.9) : score === 3 ? (rnd() < 0.5 ? null : rnd() < 0.5) : (rnd() < 0.25),
        comment: score >= 4 ? pick(goodC) : pick(badC),
        visitorName: '고객' + Math.floor(rnd() * 900 + 100),
        visitorPhone: '010-****-' + String(Math.floor(rnd() * 9000 + 1000)),
      });
    }
  }
  return records;
}

/* ═══════════════ 브라우저용 XLSX 생성 (무압축 ZIP, 외부 라이브러리 불필요) ═══════════════ */
const XlsxLite = (() => {
  const CRC_TABLE = (() => {
    const t = new Int32Array(256);
    for (let n = 0; n < 256; n++) { let c = n; for (let k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1); t[n] = c; }
    return t;
  })();
  function crc32(buf) {
    let c = ~0;
    for (let i = 0; i < buf.length; i++) c = CRC_TABLE[(c ^ buf[i]) & 0xFF] ^ (c >>> 8);
    return (~c) >>> 0;
  }
  const enc = new TextEncoder();
  function u16(v) { return [v & 255, (v >> 8) & 255]; }
  function u32(v) { return [v & 255, (v >> 8) & 255, (v >> 16) & 255, (v >>> 24) & 255]; }
  function buildZip(entries) { // 무압축(stored) ZIP
    const parts = [], centrals = [];
    let offset = 0, totalLocal = 0;
    for (const e of entries) {
      const name = enc.encode(e.name);
      const data = enc.encode(e.text);
      const crc = crc32(data);
      const local = new Uint8Array([...u32(0x04034b50), ...u16(20), ...u16(0x0800), ...u16(0), ...u16(0), ...u16(0), ...u32(crc), ...u32(data.length), ...u32(data.length), ...u16(name.length), ...u16(0)]);
      parts.push(local, name, data);
      centrals.push(new Uint8Array([...u32(0x02014b50), ...u16(20), ...u16(20), ...u16(0x0800), ...u16(0), ...u16(0), ...u16(0), ...u32(crc), ...u32(data.length), ...u32(data.length), ...u16(name.length), ...u16(0), ...u16(0), ...u16(0), ...u16(0), ...u32(0), ...u32(offset)]), name);
      offset += local.length + name.length + data.length;
    }
    totalLocal = offset;
    let cenLen = 0;
    for (const c of centrals) cenLen += c.length;
    const eocd = new Uint8Array([...u32(0x06054b50), ...u16(0), ...u16(0), ...u16(entries.length), ...u16(entries.length), ...u32(cenLen), ...u32(totalLocal), ...u16(0)]);
    const all = [...parts, ...centrals, eocd];
    let size = 0; for (const a of all) size += a.length;
    const out = new Uint8Array(size);
    let p = 0; for (const a of all) { out.set(a, p); p += a.length; }
    return out;
  }
  const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  function colLetter(n) { let s = ''; while (n > 0) { const m = (n - 1) % 26; s = String.fromCharCode(65 + m) + s; n = Math.floor((n - 1) / 26); } return s; }
  const STYLES_XML = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">
<fonts count="8">
<font><sz val="10"/><name val="맑은 고딕"/></font>
<font><sz val="18"/><b/><color rgb="FF8B1A4A"/><name val="맑은 고딕"/></font>
<font><sz val="10"/><b/><color rgb="FFFFFFFF"/><name val="맑은 고딕"/></font>
<font><sz val="10"/><b/><name val="맑은 고딕"/></font>
<font><sz val="10"/><b/><color rgb="FF1E8449"/><name val="맑은 고딕"/></font>
<font><sz val="10"/><b/><color rgb="FFC0392B"/><name val="맑은 고딕"/></font>
<font><sz val="9"/><color rgb="FF888888"/><name val="맑은 고딕"/></font>
<font><sz val="12"/><b/><color rgb="FF8B1A4A"/><name val="맑은 고딕"/></font>
</fonts>
<fills count="5">
<fill><patternFill patternType="none"/></fill>
<fill><patternFill patternType="gray125"/></fill>
<fill><patternFill patternType="solid"><fgColor rgb="FF8B1A4A"/><bgColor indexed="64"/></patternFill></fill>
<fill><patternFill patternType="solid"><fgColor rgb="FFF5F5DC"/><bgColor indexed="64"/></patternFill></fill>
<fill><patternFill patternType="solid"><fgColor rgb="FFFDF4F7"/><bgColor indexed="64"/></patternFill></fill>
</fills>
<borders count="2">
<border><left/><right/><top/><bottom/><diagonal/></border>
<border><left style="thin"><color rgb="FFD9C3CC"/></left><right style="thin"><color rgb="FFD9C3CC"/></right><top style="thin"><color rgb="FFD9C3CC"/></top><bottom style="thin"><color rgb="FFD9C3CC"/></bottom><diagonal/></border>
</borders>
<cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>
<cellXfs count="15">
<xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/>
<xf numFmtId="0" fontId="1" fillId="0" borderId="0" xfId="0" applyAlignment="1"><alignment horizontal="center" vertical="center"/></xf>
<xf numFmtId="0" fontId="6" fillId="0" borderId="0" xfId="0" applyAlignment="1"><alignment horizontal="center"/></xf>
<xf numFmtId="0" fontId="2" fillId="2" borderId="1" xfId="0" applyAlignment="1"><alignment horizontal="center" vertical="center"/></xf>
<xf numFmtId="0" fontId="0" fillId="0" borderId="1" xfId="0" applyAlignment="1"><alignment vertical="center" wrapText="1"/></xf>
<xf numFmtId="0" fontId="0" fillId="4" borderId="1" xfId="0" applyAlignment="1"><alignment vertical="center" wrapText="1"/></xf>
<xf numFmtId="0" fontId="3" fillId="3" borderId="1" xfId="0" applyAlignment="1"><alignment vertical="center"/></xf>
<xf numFmtId="0" fontId="0" fillId="0" borderId="1" xfId="0" applyAlignment="1"><alignment horizontal="right" vertical="center"/></xf>
<xf numFmtId="0" fontId="4" fillId="0" borderId="1" xfId="0" applyAlignment="1"><alignment vertical="center"/></xf>
<xf numFmtId="0" fontId="5" fillId="0" borderId="1" xfId="0" applyAlignment="1"><alignment vertical="center"/></xf>
<xf numFmtId="0" fontId="6" fillId="0" borderId="0" xfId="0"/>
<xf numFmtId="0" fontId="3" fillId="0" borderId="1" xfId="0" applyAlignment="1"><alignment vertical="center"/></xf>
<xf numFmtId="0" fontId="4" fillId="4" borderId="1" xfId="0" applyAlignment="1"><alignment vertical="center"/></xf>
<xf numFmtId="0" fontId="5" fillId="4" borderId="1" xfId="0" applyAlignment="1"><alignment vertical="center"/></xf>
<xf numFmtId="0" fontId="7" fillId="0" borderId="0" xfId="0"/>
</cellXfs>
</styleSheet>`;
  const S = { DEFAULT: 0, TITLE: 1, SUBTITLE: 2, HEADER: 3, DATA: 4, ZEBRA: 5, KEY: 6, RIGHT: 7, GOOD: 8, BAD: 9, NOTE: 10, BOLD: 11, GOOD_Z: 12, BAD_Z: 13, SECTION: 14 };
  class Sheet {
    constructor(name, opts) { this.name = name; this.opts = opts || {}; this.rows = []; this.merges = []; this.lastRow = 0; }
    cell(r, c, v, style, isNum) {
      if (!this.rows[r]) this.rows[r] = { cells: [] };
      this.rows[r].cells.push({ c, v, s: style || 0, num: !!isNum });
    }
    addRow(values, styleFn, ht) {
      const r = ++this.lastRow;
      values.forEach((v, i) => {
        if (v === undefined || v === null) return;
        this.cell(r, i + 1, v, styleFn ? styleFn(i + 1, v) : 0, typeof v === 'number' && isFinite(v));
      });
      if (ht) this.rows[r].ht = ht;
      return r;
    }
    setRow(r, values, styleFn, ht) {
      this.lastRow = Math.max(this.lastRow, r);
      values.forEach((v, i) => {
        if (v === undefined || v === null) return;
        this.cell(r, i + 1, v, styleFn ? styleFn(i + 1, v) : 0, typeof v === 'number' && isFinite(v));
      });
      if (ht && this.rows[r]) this.rows[r].ht = ht;
    }
    merge(range) { this.merges.push(range); }
    toXML() {
      let cols = '';
      if (this.opts.cols && this.opts.cols.length)
        cols = '<cols>' + this.opts.cols.map((w, i) => `<col min="${i + 1}" max="${i + 1}" width="${w}" customWidth="1"/>`).join('') + '</cols>';
      let views = '<sheetViews><sheetView workbookViewId="0"';
      if (this.opts.freeze) {
        const m = this.opts.freeze.match(/^([A-Z]+)(\d+)$/);
        const ySplit = m ? parseInt(m[2], 10) - 1 : 0;
        views += `><pane ySplit="${ySplit}" topLeftCell="${this.opts.freeze}" activePane="bottomLeft" state="frozen"/></sheetView></sheetViews>`;
      } else views += '/></sheetViews>';
      let data = '<sheetData>';
      this.rows.forEach((row, r) => {
        if (!row) return;
        data += `<row r="${r}"${row.ht ? ` ht="${row.ht}" customHeight="1"` : ''}>`;
        for (const cl of row.cells.sort((a, b) => a.c - b.c)) {
          const ref = colLetter(cl.c) + r;
          if (cl.num) data += `<c r="${ref}" s="${cl.s}"><v>${cl.v}</v></c>`;
          else if (cl.v === '') data += `<c r="${ref}" s="${cl.s}"/>`;
          else data += `<c r="${ref}" s="${cl.s}" t="inlineStr"><is><t xml:space="preserve">${esc(cl.v)}</t></is></c>`;
        }
        data += '</row>';
      });
      data += '</sheetData>';
      const af = this.opts.autoFilter ? `<autoFilter ref="${this.opts.autoFilter}"/>` : '';
      const mg = this.merges.length ? `<mergeCells count="${this.merges.length}">` + this.merges.map(m => `<mergeCell ref="${m}"/>`).join('') + '</mergeCells>' : '';
      return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">${views}${cols}${data}${af}${mg}</worksheet>`;
    }
  }
  class Workbook {
    constructor() { this.sheets = []; }
    addSheet(name, opts) { const s = new Sheet(name, opts); this.sheets.push(s); return s; }
    toUint8Array() {
      const n = this.sheets.length;
      const entries = [];
      entries.push({ name: '[Content_Types].xml', text: `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
<Default Extension="xml" ContentType="application/xml"/>
<Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>
<Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/>
${this.sheets.map((_, i) => `<Override PartName="/xl/worksheets/sheet${i + 1}.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>`).join('\n')}
</Types>` });
      entries.push({ name: '_rels/.rels', text: `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>
</Relationships>` });
      entries.push({ name: 'xl/workbook.xml', text: `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
<sheets>${this.sheets.map((s, i) => `<sheet name="${esc(s.name)}" sheetId="${i + 1}" r:id="rId${i + 1}"/>`).join('')}</sheets>
</workbook>` });
      entries.push({ name: 'xl/_rels/workbook.xml.rels', text: `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
${this.sheets.map((_, i) => `<Relationship Id="rId${i + 1}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet${i + 1}.xml"/>`).join('\n')}
<Relationship Id="rId${n + 1}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>
</Relationships>` });
      entries.push({ name: 'xl/styles.xml', text: STYLES_XML });
      this.sheets.forEach((s, i) => entries.push({ name: `xl/worksheets/sheet${i + 1}.xml`, text: s.toXML() }));
      return buildZip(entries);
    }
  }
  return { Workbook, S };
})();

function npsStyleId(nps, zebra) {
  const S = XlsxLite.S;
  if (typeof nps !== 'number') return zebra ? S.ZEBRA : S.DATA;
  if (nps >= 30) return zebra ? S.GOOD_Z : S.GOOD;
  if (nps < 0) return zebra ? S.BAD_Z : S.BAD;
  return zebra ? S.ZEBRA : S.DATA;
}

function buildWorkbook(records, opts) {
  const S = XlsxLite.S;
  const scale = NPSCore.detectScale(records);
  const wb = new XlsxLite.Workbook();
  const total = NPSCore.aggregate(records, scale);
  const periodLabel = opts.periodLabel || '전체 기간';
  const promoLabel = scale === 5 ? '추천 (★5)' : '추천 (9~10점)';
  const passLabel = scale === 5 ? '중립 (★4)' : '중립 (7~8점)';
  const detrLabel = scale === 5 ? '비추천 (★1~3)' : '비추천 (0~6점)';

  const s1 = wb.addSheet('요약', { cols: [3, 22, 20, 34, 16, 16] });
  s1.setRow(2, ['', '마드모아젤 헤어 NPS 리포트'], () => S.TITLE, 34);
  s1.merge('B2:F2');
  s1.setRow(3, ['', `기간: ${periodLabel}  |  생성: ${new Date().toLocaleString('ko-KR')}  |  출처: ${opts.source || ''}`], () => S.SUBTITLE);
  s1.merge('B3:F3');
  const pct = n => total.count ? Math.round(n / total.count * 100) : 0;
  const kv = [
    ['전체 NPS', total.nps == null ? '-' : NPSCore.fmtNps(total.nps), '(추천비율 − 비추천비율) × 100'],
    ['응답 수', total.count + '건', ''],
    [promoLabel, `${total.promoters}건 (${pct(total.promoters)}%)`, ''],
    [passLabel, `${total.passives}건 (${pct(total.passives)}%)`, ''],
    [detrLabel, `${total.detractors}건 (${pct(total.detractors)}%)`, ''],
    ['평균 만족도', total.avg == null ? '-' : total.avg + '점 / ' + scale + '점', ''],
    ['평균 청결도', total.cleanAvg == null ? '-' : total.cleanAvg + '점 / 5점', ''],
    ['재방문 의향률', total.revisitRate == null ? '-' : total.revisitRate + '%', '"잘 모르겠음" 응답 제외'],
    ['응대 불친절 응답', total.unkind + '건', '"불친절/매우 불친절" 선택 건수'],
  ];
  let r = 5;
  for (const [k, v, note] of kv) { s1.setRow(r, ['', k, v, note], c => c === 2 ? S.KEY : c === 3 ? S.RIGHT : S.NOTE, 20); r++; }

  const aggHeaders = ['응답수', 'NPS', '평균 만족도', '평균 청결도', '추천', '중립', '비추천', '재방문 의향률', '불친절 응답'];
  const aggValues = a => [a.count, a.nps == null ? '-' : a.nps, a.avg == null ? '-' : a.avg, a.cleanAvg == null ? '-' : a.cleanAvg, a.promoters, a.passives, a.detractors, a.revisitRate == null ? '-' : a.revisitRate + '%', a.unkind];

  const s2 = wb.addSheet('지점별', { cols: [20, 9, 9, 12, 12, 8, 8, 9, 13, 11], freeze: 'A2' });
  s2.addRow(['지점', ...aggHeaders], () => S.HEADER, 22);
  NPSCore.groupAggregate(records, x => x.store, scale).forEach((a, i) => {
    const z = i % 2 === 1;
    s2.addRow([a.key, ...aggValues(a)], c => c === 3 ? npsStyleId(a.nps, z) : (z ? S.ZEBRA : S.DATA), 18);
  });

  const s3 = wb.addSheet('디자이너별', { cols: [16, 20, 9, 9, 12, 12, 8, 8, 9, 13, 11], freeze: 'A2' });
  s3.addRow(['디자이너', '지점', ...aggHeaders], () => S.HEADER, 22);
  NPSCore.groupAggregate(records, x => x.designer, scale).forEach((a, i) => {
    const z = i % 2 === 1;
    const stores = [...new Set(a._records.map(x => x.store))].join(', ');
    s3.addRow([a.key, stores, ...aggValues(a)], c => c === 4 ? npsStyleId(a.nps, z) : (z ? S.ZEBRA : S.DATA), 18);
  });

  const s4 = wb.addSheet('추이', { cols: [16, 9, 9, 12, 8, 8, 9] });
  s4.addRow(['주간 추이'], () => S.SECTION, 24);
  s4.addRow(['주 (월~일)', '응답수', 'NPS', '평균 만족도', '추천', '중립', '비추천'], () => S.HEADER, 22);
  NPSCore.trend(records, 'week', scale).forEach((t, i) => {
    const z = i % 2 === 1;
    s4.addRow([t.label, t.count, t.nps, t.avg, t.promoters, t.passives, t.detractors], c => c === 3 ? npsStyleId(t.nps, z) : (z ? S.ZEBRA : S.DATA), 18);
  });
  s4.addRow(['']);
  s4.addRow(['월간 추이'], () => S.SECTION, 24);
  s4.addRow(['월', '응답수', 'NPS', '평균 만족도', '추천', '중립', '비추천'], () => S.HEADER, 22);
  NPSCore.trend(records, 'month', scale).forEach((t, i) => {
    const z = i % 2 === 1;
    s4.addRow([t.label, t.count, t.nps, t.avg, t.promoters, t.passives, t.detractors], c => c === 3 ? npsStyleId(t.nps, z) : (z ? S.ZEBRA : S.DATA), 18);
  });

  const s5 = wb.addSheet('원본데이터', { cols: [12, 18, 12, 8, 8, 8, 11, 11, 7, 12, 30, 40, 10, 14], freeze: 'A2', autoFilter: 'A1:N1' });
  s5.addRow(['날짜', '지점', '디자이너', '만족도', '청결도', '분류', '응대', '재방문 의향', '성별', '나이', '불편사항', '자유 의견', '고객명', '연락처'], () => S.HEADER, 22);
  const sorted = [...records].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  sorted.forEach((x, i) => {
    const z = i % 2 === 1;
    const label = NPSCore.classifyLabel(x.score, scale);
    const S_ = XlsxLite.S;
    const labelStyle = label === '비추천' ? (z ? S_.BAD_Z : S_.BAD) : label === '추천' ? (z ? S_.GOOD_Z : S_.GOOD) : (z ? S_.ZEBRA : S_.DATA);
    s5.addRow([x.date, x.store, x.designer, x.score, x.clean || '-', label, x.kindness, x.revisit === true ? '있음' : x.revisit === false ? '없음' : '모름', x.gender, x.age, x.unkindComment, x.comment, x.visitorName, x.visitorPhone],
      c => c === 6 ? labelStyle : (z ? S_.ZEBRA : S_.DATA));
  });
  return wb;
}

/* ═══════════════ 로그인 (WebCrypto: PBKDF2 + AES-GCM) ═══════════════ */
const b64d = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function tryLogin(id, pw) {
  const user = AUTH_USERS.find(u => u.id === id.trim());
  if (!user) return null;
  try {
    const enc = new TextEncoder();
    const keyMat = await crypto.subtle.importKey('raw', enc.encode(id.trim() + ':' + pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey({ name: 'PBKDF2', salt: b64d(user.salt), iterations: 150000, hash: 'SHA-256' }, keyMat, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
    const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64d(user.iv) }, key, b64d(user.wrapped));
    return JSON.parse(new TextDecoder().decode(plain)).csvUrl;
  } catch (e) { return null; } // 비밀번호 불일치 → 복호화 실패
}
function showLogin(show) { document.getElementById('loginOverlay').style.display = show ? 'flex' : 'none'; }
async function initAuth() {
  if (!crypto.subtle) {
    document.getElementById('loginErr').textContent = '이 브라우저에서는 로그인 기능을 사용할 수 없습니다.';
    return;
  }
  const saved = sessionStorage.getItem('nps_data_url');
  if (saved) { DATA_URL = saved; showLogin(false); load(); return; }
  showLogin(true);
  const doLogin = async () => {
    const btn = document.getElementById('loginBtn');
    btn.textContent = '확인 중…'; btn.disabled = true;
    const url = await tryLogin(document.getElementById('loginId').value, document.getElementById('loginPw').value);
    btn.textContent = '로그인'; btn.disabled = false;
    if (url) {
      DATA_URL = url;
      sessionStorage.setItem('nps_data_url', url);
      showLogin(false);
      load();
    } else {
      document.getElementById('loginErr').textContent = '아이디 또는 비밀번호가 맞지 않습니다.';
    }
  };
  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.getElementById('loginPw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('loginId').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
}

/* ═══════════════ 데이터 로딩 (브라우저 직접 fetch) ═══════════════ */
async function fetchLive() {
  if (!DATA_URL) throw new Error('로그인 필요');
  let lastErr = '';
  try {
    const res = await fetch(DATA_URL, { redirect: 'follow' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    if (/<html/i.test(text.slice(0, 300))) throw new Error('시트가 비공개 상태 (공유 설정 확인)');
    const records = rowsToRecords(parseCSV(text));
    if (records.length) return { records, source: '구글시트 (실시간)' };
    lastErr = '유효한 응답 행 없음';
  } catch (e) { lastErr = e.message; }
  throw new Error(lastErr || '연결 실패');
}

/* ═══════════════ 대시보드 UI ═══════════════ */
let ALL = [], SCALE = 5, MODE = 'sample', SOURCE = '';
let range = { from: null, to: null, label: '', prevFrom: null, prevTo: null };
const $ = s => document.querySelector(s);
const ymd = d => NPSCore.ymd(d);

function computeRange(p) {
  const now = new Date();
  const t = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  let from, to, pf, pt, label;
  if (p === 'thisweek' || p === 'lastweek') {
    let ws = NPSCore.weekStart(t);
    if (p === 'lastweek') ws = new Date(ws.getFullYear(), ws.getMonth(), ws.getDate() - 7);
    const we = new Date(ws); we.setDate(ws.getDate() + 6);
    from = ymd(ws); to = ymd(we);
    const pws = new Date(ws); pws.setDate(ws.getDate() - 7);
    const pwe = new Date(ws); pwe.setDate(ws.getDate() - 1);
    pf = ymd(pws); pt = ymd(pwe);
    label = from.replace(/-/g, '.') + ' ~ ' + to.replace(/-/g, '.') + ' (주간)';
  } else if (p === 'thismonth' || p === 'lastmonth') {
    let y = t.getFullYear(), m = t.getMonth();
    if (p === 'lastmonth') { m--; if (m < 0) { m = 11; y--; } }
    from = ymd(new Date(y, m, 1)); to = ymd(new Date(y, m + 1, 0));
    let py = y, pm = m - 1; if (pm < 0) { pm = 11; py--; }
    pf = ymd(new Date(py, pm, 1)); pt = ymd(new Date(py, pm + 1, 0));
    label = y + '년 ' + (m + 1) + '월 (월간)';
  } else if (p === '4weeks') {
    const s = new Date(t); s.setDate(t.getDate() - 27);
    from = ymd(s); to = ymd(t);
    const ps = new Date(s); ps.setDate(s.getDate() - 28);
    const pe = new Date(s); pe.setDate(s.getDate() - 1);
    pf = ymd(ps); pt = ymd(pe);
    label = from.replace(/-/g, '.') + ' ~ ' + to.replace(/-/g, '.') + ' (최근 4주)';
  } else { from = null; to = null; pf = null; pt = null; label = '전체 기간'; }
  return { from, to, prevFrom: pf, prevTo: pt, label };
}
function cur() { return NPSCore.filterByRange(ALL, range.from, range.to); }
function prev() { return range.prevFrom ? NPSCore.filterByRange(ALL, range.prevFrom, range.prevTo) : []; }
function npsClass(n) { return n == null ? '' : n >= 30 ? 'nps-pos' : n < 0 ? 'nps-neg' : 'nps-mid'; }
function fmt(n) { return NPSCore.fmtNps(n); }

function render() {
  const rs = cur(), ps = prev();
  const a = NPSCore.aggregate(rs, SCALE);
  const pa = ps.length ? NPSCore.aggregate(ps, SCALE) : null;
  const delta = (c, p) => (pa && p != null && c != null) ? (c - p > 0 ? '<span class="nps-pos">▲' + (c - p) + '</span>' : c - p < 0 ? '<span class="nps-neg">▼' + (p - c) + '</span>' : '—') + ' 직전 기간 대비' : '';
  $('#cards').innerHTML = `
    <div class="card"><div class="k">전체 NPS</div><div class="v ${npsClass(a.nps)}">${fmt(a.nps)}</div><div class="d">${delta(a.nps, pa && pa.nps)}</div></div>
    <div class="card"><div class="k">응답 수</div><div class="v">${a.count}<small>건</small></div><div class="d">${pa ? '직전 ' + pa.count + '건' : ''}</div></div>
    <div class="card"><div class="k">추천 / 중립 / 비추천</div><div class="v" style="font-size:20px;">😍${a.promoters} 😐${a.passives} 😟${a.detractors}</div></div>
    <div class="card"><div class="k">평균 만족도 (${SCALE}점 만점)</div><div class="v">${a.avg ?? '-'}<small>점</small></div></div>
    <div class="card"><div class="k">재방문 의향</div><div class="v">${a.revisitRate ?? '-'}<small>${a.revisitRate != null ? '%' : ''}</small></div></div>
    <div class="card"><div class="k">응대 불친절 응답</div><div class="v ${a.unkind ? 'nps-neg' : ''}">${a.unkind}<small>건</small></div></div>`;
  const tbl = (rows, nameHead) => {
    if (!rows.length) return '<div class="empty">해당 기간 응답이 없습니다</div>';
    return '<table><tr><th>' + nameHead + '</th><th>응답</th><th>NPS</th><th>평균</th><th>재방문</th><th>불친절</th></tr>' +
      rows.map(s => `<tr><td>${s.key}</td><td>${s.count}</td><td class="${npsClass(s.nps)}">${fmt(s.nps)}</td><td>${s.avg ?? '-'}</td><td>${s.revisitRate != null ? s.revisitRate + '%' : '-'}</td><td>${s.unkind || '-'}</td></tr>`).join('') + '</table>';
  };
  $('#storeTable').innerHTML = tbl(NPSCore.groupAggregate(rs, r => r.store, SCALE), '지점');
  $('#designerTable').innerHTML = tbl(NPSCore.groupAggregate(rs, r => r.designer, SCALE).slice(0, 15), '디자이너');
  renderTrend();
  renderDraft();
}

function renderTrend() {
  const unit = $('#trendUnit').value;
  const data = NPSCore.trend(ALL, unit, SCALE).slice(-16);
  if (!data.length) { $('#trendChart').innerHTML = '<div class="empty">데이터 없음</div>'; return; }
  const W = Math.max(640, data.length * 60), H = 200, pad = 30;
  const y = v => H - pad - ((v + 100) / 200) * (H - 2 * pad);
  let svg = `<svg width="${W}" height="${H + 30}" xmlns="http://www.w3.org/2000/svg" style="font-family:inherit">`;
  svg += `<line x1="0" y1="${y(0)}" x2="${W}" y2="${y(0)}" stroke="#E0D0C8" stroke-dasharray="4 3"/>`;
  const step = (W - 40) / data.length;
  let pts = [];
  data.forEach((d, i) => {
    const x = 30 + i * step + step / 2;
    pts.push(x + ',' + y(d.nps));
    const barH = Math.max(2, d.count * 4);
    svg += `<rect x="${x - 10}" y="${H - pad - barH}" width="20" height="${barH}" fill="#F4E4C1" rx="3"/>`;
    svg += `<text x="${x}" y="${H + 12}" font-size="10" text-anchor="middle" fill="#6B6B6B">${d.label}</text>`;
    svg += `<text x="${x}" y="${y(d.nps) - 8}" font-size="11" font-weight="bold" text-anchor="middle" fill="${d.nps >= 30 ? '#1E8449' : d.nps < 0 ? '#C0392B' : '#2C2C2C'}">${fmt(d.nps)}</text>`;
  });
  svg += `<polyline points="${pts.join(' ')}" fill="none" stroke="#8B1A4A" stroke-width="2.5"/>`;
  pts.forEach(p => { const [x, yy] = p.split(','); svg += `<circle cx="${x}" cy="${yy}" r="4" fill="#8B1A4A"/>`; });
  svg += `<text x="4" y="14" font-size="10" fill="#6B6B6B">선: NPS / 막대: 응답수</text></svg>`;
  $('#trendChart').innerHTML = svg;
}

function renderDraft() {
  const draft = NPSCore.buildKakaoDraft(cur(), {
    periodLabel: range.label,
    prevRecords: $('#optDelta').checked ? prev() : null,
    includeStores: $('#optStores').checked,
    topDesigners: parseInt($('#optTop').value, 10),
    includeCaution: $('#optCaution').checked,
    scale: SCALE,
  });
  $('#draft').value = draft + (MODE === 'sample' ? '\n\n(⚠️ 샘플 데이터 기준 — 실데이터 연결 후 다시 생성하세요)' : '');
}

function renderBanner() {
  const b = $('#banner');
  if (MODE === 'live') {
    b.innerHTML = `<div class="banner live">✅ <b>실데이터 연결됨</b> — 출처: ${SOURCE}</div>`;
  } else {
    b.innerHTML = `<div class="banner sample">🧪 <b>지금은 샘플 데이터 모드입니다.</b> (${SOURCE})
      시트 연결에 실패했습니다. 구글시트 공유 설정을 확인하거나 관리자(Claude)에게 문의하세요.</div>`;
  }
}

async function load() {
  $('#meta').textContent = '불러오는 중…';
  try {
    const live = await fetchLive();
    ALL = live.records; MODE = 'live'; SOURCE = live.source;
  } catch (e) {
    ALL = sampleRecords(); MODE = 'sample'; SOURCE = '샘플 데이터 (' + e.message + ')';
  }
  SCALE = NPSCore.detectScale(ALL);
  $('#meta').textContent = `응답 ${ALL.length}건 · ${SCALE}점 척도 · 마지막 갱신 ${new Date().toLocaleString('ko-KR')}`;
  renderBanner();
  render();
  if (location.hash === '#kakao') setTimeout(() => $('#kakaoPanel').scrollIntoView({ block: 'start' }), 100);
}

document.querySelectorAll('#periodBar .chip').forEach(ch => {
  ch.addEventListener('click', () => {
    document.querySelectorAll('#periodBar .chip').forEach(c => c.classList.remove('on'));
    ch.classList.add('on');
    range = computeRange(ch.dataset.p);
    $('#fromDate').value = range.from || '';
    $('#toDate').value = range.to || '';
    render();
  });
});
$('#applyCustom').addEventListener('click', () => {
  document.querySelectorAll('#periodBar .chip').forEach(c => c.classList.remove('on'));
  const f = $('#fromDate').value || null, t = $('#toDate').value || null;
  let pf = null, pt = null;
  if (f && t) {
    const days = (new Date(t) - new Date(f)) / 86400000 + 1;
    const pfD = new Date(f); pfD.setDate(pfD.getDate() - days);
    const ptD = new Date(f); ptD.setDate(ptD.getDate() - 1);
    pf = ymd(pfD); pt = ymd(ptD);
  }
  range = { from: f, to: t, prevFrom: pf, prevTo: pt, label: (f || '처음') + ' ~ ' + (t || '오늘') };
  render();
});
$('#refreshBtn').addEventListener('click', load);
$('#excelBtn').addEventListener('click', () => {
  const records = cur();
  const wb = buildWorkbook(records, { periodLabel: range.label, source: SOURCE });
  const bytes = wb.toUint8Array();
  const blob = new Blob([bytes], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'NPS리포트_' + (range.from || '전체') + '_' + (range.to || ymd(new Date())) + (MODE === 'sample' ? '_샘플' : '') + '.xlsx';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
});
$('#trendUnit').addEventListener('change', renderTrend);
['optStores', 'optTop', 'optCaution', 'optDelta'].forEach(id => $('#' + id).addEventListener('change', renderDraft));
$('#copyBtn').addEventListener('click', async () => {
  const btn = $('#copyBtn');
  try { await navigator.clipboard.writeText($('#draft').value); }
  catch (e) { $('#draft').select(); document.execCommand('copy'); }
  btn.textContent = '✅ 복사 완료!';
  btn.classList.add('done');
  setTimeout(() => { btn.textContent = '📋 카톡용 텍스트 복사'; btn.classList.remove('done'); }, 2000);
});

$('#logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem('nps_data_url');
  DATA_URL = null;
  location.reload();
});

// 5분마다 자동 새로고침 (열어둔 화면도 최신 유지)
setInterval(() => { if (DATA_URL) load(); }, 5 * 60 * 1000);

range = computeRange('thismonth');
initAuth();
</script>
</body>
